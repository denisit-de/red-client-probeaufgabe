<app-grid-container>
  <div class="content" content>
    <app-search (searchEvent)="onSearch($event)"></app-search>

    <app-unicorn-table
      [columns]="columns"
      [entries]="(entries$ | async) ?? []"
      [isLoading]="isLoading"
      [totalLength]="(totalLength$ | async) ?? 0"
    ></app-unicorn-table>
  </div>
</app-grid-container>
